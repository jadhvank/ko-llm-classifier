<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 텍스트 판별 — 설정</title>
  <style>
    :root {
      --bg: #ffffff; --fg: #1f2328; --muted: #6b7280; --card: #f6f8fa;
      --border: #e5e7eb; --accent: #2563eb; --red: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0d1117; --fg: #e6edf3; --muted: #9198a1; --card: #161b22; --border: #30363d; --accent: #4493f8; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0 auto; max-width: 640px; padding: 28px 20px; background: var(--bg); color: var(--fg);
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { color: var(--muted); margin-top: 0; }
    .row { display: flex; gap: 8px; margin: 16px 0; }
    input[type=text] {
      flex: 1; font: inherit; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    }
    button {
      font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid var(--border);
      background: var(--accent); color: #fff; padding: 8px 14px;
    }
    button.ghost { background: transparent; color: var(--red); border-color: var(--border); padding: 4px 10px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; margin-bottom: 8px;
    }
    li .h { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .empty { color: var(--muted); font-style: italic; }
    .hint { color: var(--muted); font-size: 12.5px; }
  </style>
</head>
<body>
  <h1>자동 분석 도메인</h1>
  <p class="sub">여기에 등록한 도메인은 방문 시 자동으로 판별합니다. 나머지 사이트는 아이콘을 눌러 수동으로 분석하세요.</p>

  <div class="row">
    <input type="text" id="host" placeholder="example.com (하위 도메인 포함)" />
    <button id="add">추가</button>
  </div>
  <p class="hint">예: <code>brunch.co.kr</code> 를 넣으면 <code>www.brunch.co.kr</code> 등 하위 도메인도 자동 분석됩니다.</p>

  <ul id="list"></ul>

  <p class="hint" style="margin-top:32px; border-top:1px solid var(--border); padding-top:16px;">
    이 확장이 마음에 드셨다면 ☕
    <a href="https://ko-fi.com/jadhvank" target="_blank" rel="noopener noreferrer">개발자에게 커피 한 잔 사주기</a>
  </p>

  <script src="options.js"></script>
</body>
</html>
